<script data-goatcounter="https://toddejhill.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

<body>
<header class="site-header">
  <a href="index.html" class="logo">Todd Hill</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>
</header>

<main class="contact-page">
  <div class="contact-inner">
    <h1>Get in Touch</h1>
    <p class="subtitle">Prints, collaborations, or questions — I'd love to hear from you.</p>

    <form class="contact-form" action="mailto:your@email.com" method="post" enctype="text/plain">
      <label>
        <span>Name</span>
        <input type="text" name="name" required />
      </label>
      <label>
        <span>Email</span>
        <input type="email" name="email" required />
      </label>
      <label>
        <span>Message</span>
        <textarea name="message" rows="6" required></textarea>
      </label>
      <button type="submit" class="btn">Send Message</button>
    </form>

    <div class="contact-alt">
      <p>Or email directly: <a href="mailto:your@email.com">your@email.com</a></p>
    </div>
  </div>
</main>

<footer class="site-footer">
  <p>&copy; <span id="year"></span> Todd Hill. All images are copyrighted.</p>
</footer>

<script src="js/main.js"></script>
</body>
</html>
